[build]
  command = "npm run build"
  publish = "dist"

# ── Cache headers — resolve "Add Expires headers" (YSlow F → A) ──

# Static assets: 1 year cache (they are fingerprinted by Astro build)
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images: 30 days cache
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# Root images (Gemini etc)
[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# Fonts: 1 year cache
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Videos: 7 days cache
[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# HTML pages: short cache with revalidation
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
